<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iggle Originals</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

img{
  max-width:90%;
  max-height:90%;
  cursor:pointer;
  transition:0.2s;
}

img:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<img id="mainImage"
src="https://tse3.mm.bing.net/th/id/OIP.ZqfNp4moLeeFXlNNd8MjAgAAAA?rs=1&pid=ImgDetMain&o=7&rm=3"
onerror="this.src='https://wildestofficial.com/wp-content/uploads/2024/03/IMG_7326-1024x636.jpeg'">

<script>
const games = [
  "https://gorillavanilla.vercel.app/",
  "https://bird-balls.vercel.app/"
];

document.getElementById("mainImage").onclick = () => {
  const randomGame = games[Math.floor(Math.random() * games.length)];
  window.location.href = randomGame;
};
</script>

</body>
</html>
